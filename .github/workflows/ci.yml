name: CI

on:
  push:
    branches: [ main, master ]
    tags: ['v*', 'release/*']
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'src/test/resources/**'
      - 'README.md'
      - '.github/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'src/test/resources/**'
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run tests (maven)
        run: mvn -B clean test

      - name: Generate Allure report (maven plugin)
        run: mvn -B allure:report

      - name: Upload Allure report (static)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    # run for pull requests (to create previews) and for main/master pushes
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      PUBLISH_BRANCH: 'allure-pages'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build and generate Allure report
        run: mvn -B clean test allure:report

      - name: Deploy Allure report to custom branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure
          publish_branch: ${{ env.PUBLISH_BRANCH }}

      - name: Comment PR with Allure report URL
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Allure report for this PR has been published.
            You can view the latest report at:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/


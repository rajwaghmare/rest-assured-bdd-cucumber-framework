name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Run Tests
        run: mvn clean test

      # ✅ Debug step (VERY IMPORTANT)
      - name: Check Allure Results
        run: |
          echo "Checking allure-results folder..."
          ls -la target || true
          ls -la target/allure-results || true

      # ✅ Upload results only if exist
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      # ✅ Install Allure CLI (npm based)
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ✅ Generate report using CLI (NOT Maven)
      - name: Generate Allure Report
        run: |
          allure generate target/allure-results --clean -o target/allure-report

      # ✅ Upload final report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
          if-no-files-found: warn